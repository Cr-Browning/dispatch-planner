[pytest]
testpaths = app/tests
pythonpath = .
asyncio_mode = auto
markers =
    phase2: Phase 2 database schema tests
    phase3: Phase 3 scaffold and auth tests
    phase4: Phase 4 CRUD API and service tests
    phase5: Phase 5 seed data tests
    phase6: Phase 6 routing provider tests
    phase7: Phase 7 Google routing (optional integration)
    phase8: Phase 8 eligibility and scarcity tests
    phase9: Phase 9 assignment solver tests
    phase10: Phase 10 route solver tests
    phase11: Phase 11 manual override tests
    phase12: Phase 12 export tests
    phase13: Phase 13 frontend and settings API tests
    phase14: Phase 14 map preview API (route geometry on plan)
    phase15: Phase 15 final API integration and quality-bar tests
    integration: requires external services (e.g. Google Maps API key)
